set -g mode-keys vi
set -g mouse on
set -g set-titles on
set -g focus-events on

# Keep generous tmux history for long-running log inspection.
set -g history-limit 1000000
set -s buffer-limit 10000
set -s message-limit 100000
set -s prompt-history-limit 10000
set -s input-buffer-size 10485760

set -g set-titles-string '#S:#W — #{pane_title}'
set -g @plugin 'tmux-plugins/tpm'

setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"

set -sg escape-time 50
set -g status-left-length 20 
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind -n C-l send-keys -R C-l \; clear-history \;
set -ag update-environment VSCODE_IPC_HOOK_CLI

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-logging'
set -gq set-clipboard on
set -gq allow-passthrough on
set -sq extended-keys on
set -asq terminal-features 'xterm*:extkeys'
set -g renumber-windows on
set -g default-terminal "tmux-256color"
# set -g @continuum-restore 'on'

if-shell '[ -x "$HOME/.tmux/plugins/tpm/tpm" ]' 'run "$HOME/.tmux/plugins/tpm/tpm"'

# theme
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_date_time_icon "󱑒 "
set -g @catppuccin_date_time_text " %H:%M:%S"

if-shell '[ -r "$HOME/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux" ] && tmux -V | awk '"'"'{ split($2, v, /[^0-9]+/); exit !((v[1] > 3) || (v[1] == 3 && v[2] >= 5)) }'"'"'' \
  'run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux; \
   set -g status-right-length 100; \
   set -g status-left-length 100; \
   set -g status-left ""; \
   set -g status-right "#{E:@catppuccin_status_application}"; \
   set -ag status-right "#{E:@catppuccin_status_session}"; \
   set -ag status-right "#{E:@catppuccin_status_date_time}"' \
  'set -g status-right-length 100; \
   set -g status-left-length 100; \
   set -g status-left ""; \
   set -g status-right "#S #[fg=colour245]| %H:%M:%S"'
set -g status-interval 1
# Don’t tint the whole copy-mode screen (this is what made selection “disappear”)
set -wgq mode-style "default"
set -wgq copy-mode-selection-style "bg=colour254,fg=colour232,bold"
